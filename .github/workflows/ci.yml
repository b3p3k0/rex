name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v4

      - name: Lint, test, and build
        run: ./gradlew lint testDebugUnitTest assembleDebug assembleRelease

      # R8 has silently stripped SSHJ cipher classes twice before; a release
      # build whose mapping.txt loses the cipher keeps cannot negotiate SSH.
      - name: R8 keep-rule canary
        run: |
          count=$(grep -c '^net\.schmizz\.sshj\.transport\.cipher' app/build/outputs/mapping/release/mapping.txt || true)
          echo "SSHJ cipher classes kept: $count"
          if [ "$count" -eq 0 ]; then
            echo '::error::R8 stripped the SSHJ cipher classes; check app/proguard-rules.pro'
            exit 1
          fi

      - name: Upload reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: |
            app/build/reports/
            app/build/test-results/
          retention-days: 7
